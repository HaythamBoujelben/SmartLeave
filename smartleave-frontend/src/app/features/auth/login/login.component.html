<div style="display:flex; justify-content:center; align-items:center; height:100vh; background:#f5f5f5">
  <mat-card style="width:400px; padding:2rem;">
    <mat-card-title style="margin-bottom:1.5rem; font-size:22px;">
      🏖️ SmartLeave
    </mat-card-title>
    <mat-card-subtitle style="margin-bottom:1.5rem;">Sign in to your account</mat-card-subtitle>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" style="width:100%">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" type="email" placeholder="you@example.com"/>
        <mat-error *ngIf="form.get('email')?.hasError('required')">Email is required</mat-error>
        <mat-error *ngIf="form.get('email')?.hasError('email')">Invalid email</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" style="width:100%; margin-top:8px">
        <mat-label>Password</mat-label>
        <input matInput formControlName="password" type="password"/>
        <mat-error *ngIf="form.get('password')?.hasError('required')">Password is required</mat-error>
      </mat-form-field>

      <p *ngIf="error" style="color:red; font-size:13px; margin-top:4px">{{ error }}</p>

      <button mat-raised-button color="primary"
              type="submit"
              style="width:100%; margin-top:1rem; height:44px"
              [disabled]="loading || form.invalid">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p style="text-align:center; margin-top:1rem; font-size:13px">
      No account? <a routerLink="/register">Register here</a>
    </p>
  </mat-card>
</div>
