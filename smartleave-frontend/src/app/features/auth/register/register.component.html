<div style="display:flex; justify-content:center; align-items:center; height:100vh; background:#f5f5f5">
  <mat-card style="width:420px; padding:2rem;">
    <mat-card-title style="margin-bottom:1.5rem; font-size:22px;">🏖️ SmartLeave</mat-card-title>
    <mat-card-subtitle style="margin-bottom:1.5rem;">Create an account</mat-card-subtitle>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" style="width:100%">
        <mat-label>Full name</mat-label>
        <input matInput formControlName="fullName"/>
      </mat-form-field>

      <mat-form-field appearance="outline" style="width:100%">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" type="email"/>
      </mat-form-field>

      <mat-form-field appearance="outline" style="width:100%">
        <mat-label>Password</mat-label>
        <input matInput formControlName="password" type="password"/>
      </mat-form-field>

      <mat-form-field appearance="outline" style="width:100%">
        <mat-label>Role</mat-label>
        <mat-select formControlName="role">
          <mat-option value="Employee">Employee</mat-option>
          <mat-option value="Manager">Manager</mat-option>
        </mat-select>
      </mat-form-field>

      <p *ngIf="error" style="color:red; font-size:13px">{{ error }}</p>

      <button mat-raised-button color="primary" type="submit"
              style="width:100%; margin-top:1rem; height:44px"
              [disabled]="loading || form.invalid">
        {{ loading ? 'Creating...' : 'Sign Up' }}
      </button>
    </form>

    <p style="text-align:center; margin-top:1rem; font-size:13px">
      Already have an account? <a routerLink="/login">Sign in</a>
    </p>
  </mat-card>
</div>
