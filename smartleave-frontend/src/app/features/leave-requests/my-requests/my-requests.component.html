<div style="padding:2rem; max-width:1100px; margin:0 auto;">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
    <h2>My Leave Requests</h2>
    <button mat-stroked-button (click)="logout()">Logout</button>
  </div>

  <mat-card>
    <p *ngIf="loading">Loading...</p>
    <p *ngIf="error" style="color:red">{{ error }}</p>

    <table mat-table [dataSource]="requests" *ngIf="!loading && requests.length" style="width:100%">
      <ng-container matColumnDef="leaveTypeName">
        <th mat-header-cell *matHeaderCellDef>Type</th>
        <td mat-cell *matCellDef="let r">{{ r.leaveTypeName }}</td>
      </ng-container>
      <ng-container matColumnDef="startDate">
        <th mat-header-cell *matHeaderCellDef>Start</th>
        <td mat-cell *matCellDef="let r">{{ r.startDate | date:'mediumDate' }}</td>
      </ng-container>
      <ng-container matColumnDef="endDate">
        <th mat-header-cell *matHeaderCellDef>End</th>
        <td mat-cell *matCellDef="let r">{{ r.endDate | date:'mediumDate' }}</td>
      </ng-container>
      <ng-container matColumnDef="totalDays">
        <th mat-header-cell *matHeaderCellDef>Days</th>
        <td mat-cell *matCellDef="let r">{{ r.totalDays }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let r">{{ r.status }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let r">
          <button mat-button color="warn"
                  *ngIf="r.status === 'Pending'"
                  (click)="cancel(r.id)">Cancel</button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <p *ngIf="!loading && !requests.length">No requests yet.</p>
  </mat-card>
</div>
